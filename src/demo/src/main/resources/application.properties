spring.application.name=demo

server.servlet.context-path=/api

spring.datasource.url=${SERVER_URL}
spring.datasource.username=${SERVER_USERNAME}
spring.datasource.password=${SERVER_PASSWORD}


# Esta configuración es para que imprima los SQL (queries) generados
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


places_app.jwt.secret=mi_clave_secreta_para_jwt%$_sdfsdlfksjdflksdjflksdfsdsldfk
places_app.jwt.expiration=3600
places_app.jwt.refresh_expiration=4000


spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
# For Gmail, you need to use an App Password, not your regular account password
spring.mail.password=${MAIL_PASSWORD}

# Optional: for debugging purposes
spring.mail.properties.mail.debug=true

spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.server.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.allow8bitmime=true
spring.mail.properties.mail.smtps.quitwait=false