<mat-card>
  <mat-card-header class="d-flex justify-content-center">
    <mat-card-title>Registro de Empresa</mat-card-title>
    <mat-card-subtitle> &nbsp;</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="empresaForm" class="login-controls">
      <section class="row">
        <mat-form-field class="col-xl-2 col-lg-4 col-md-4 col-sm-6 col-12">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre">
          <mat-error>
            <app-error-message [control]="nombreControl"></app-error-message>
          </mat-error>
        </mat-form-field>

        <mat-form-field class="col-xl-2 col-lg-4 col-md-4 col-sm-6 col-12">
          <mat-label>Categoría</mat-label>
          <mat-select formControlName="categoriaId">
            @for (categoria of categorias(); track $index) {
            <mat-option [value]="categoria.categoriaId">
              {{categoria.nombre}}
            </mat-option>
            }
          </mat-select>
          <mat-error>
            <app-error-message [control]="categoriaControl"></app-error-message>
          </mat-error>
        </mat-form-field>
      </section>
    </form>
  </mat-card-content>
  <mat-card-actions>
    <button matButton="filled" (click)="guardarEmpresa()" [disabled]="!empresaForm.valid || cargando()">
      @if (cargando()) {

      <app-spinner [diametro]="20"></app-spinner>
      Cargando...

      }
      @else{

      <span>Guardar</span>

      }
    </button>
  </mat-card-actions>
</mat-card>
