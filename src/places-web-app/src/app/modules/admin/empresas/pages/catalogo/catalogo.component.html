<mat-card>
  <mat-card-header class="d-flex justify-content-center">
    <mat-card-title>Consulta de Empresas</mat-card-title>
    <mat-card-subtitle> &nbsp;</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="busquedaForm">
      <section  class="row">
        <mat-form-field appearance="fill" class="col-xl-2 col-lg-4 col-md-4 col-sm-6 col-12">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre">
          <mat-error>
            <app-error-message [control]="nombreControl"></app-error-message>
          </mat-error>
        </mat-form-field>

        <mat-form-field class="col-xl-2 col-lg-4 col-md-4 col-sm-6 col-12">
          <mat-label>Categoría</mat-label>
          <mat-select formControlName="categoriaId">
            @for (categoria of categorias(); track $index) {
            <mat-option [value]="categoria.categoriaId">
              {{categoria.nombre}}
            </mat-option>
            }
          </mat-select>
          <mat-error>
            <app-error-message [control]="categoriaControl"></app-error-message>
          </mat-error>
        </mat-form-field>
      </section>
    </form>
  </mat-card-content>
  <mat-card-actions>
    <button mat-fab type="button" (click)="crearEmpresa(null)">
      <mat-icon>add</mat-icon>
    </button>
    <button mat-fab type="button" (click)="buscar()">
      <mat-icon>search</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>

<mat-card>
  <mat-card-content>
    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="empresas()">
        <ng-container matColumnDef="empresaId">
          <th mat-header-cell *matHeaderCellDef> Id </th>
          <td mat-cell *matCellDef="let element"> {{element.empresaId}} </td>
        </ng-container>

        <ng-container matColumnDef="empresa">
          <th mat-header-cell *matHeaderCellDef> Empresa </th>
          <td mat-cell *matCellDef="let element"> {{element.empresa}} </td>
        </ng-container>

        <ng-container matColumnDef="categoria">
          <th mat-header-cell *matHeaderCellDef> Categoría</th>
          <td mat-cell *matCellDef="let element"> {{element.categoria}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Editar </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button (click)="editarEmpresa(element)">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['empresaId', 'empresa', 'categoria', 'actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['empresaId', 'empresa', 'categoria', 'actions'];">
        </tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
