<form [formGroup]="datosPersonalesForm" class="row">

    <!-- Campo Nombre -->
    <mat-form-field class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-12">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" />
        <mat-error>
            <app-error-message [control]="dpControls['nombre']" />
        </mat-error>
    </mat-form-field>

    <!-- Campo de primer apellido -->
    <mat-form-field class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-12">
        <mat-label>Primer apellido</mat-label>
        <input matInput formControlName="apellidoPaterno" />
        <mat-error>
            <app-error-message [control]="dpControls['apellidoPaterno']" />
        </mat-error>
    </mat-form-field>

    <!-- Campo de segundo apellido -->
    <mat-form-field class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-12">
        <mat-label>Segundo apellido</mat-label>
        <input matInput formControlName="apellidoMaterno" />
        <mat-error>
            <app-error-message [control]="dpControls['apellidoMaterno']" />
        </mat-error>
    </mat-form-field>

    <!-- Fecha de nacimiento -->
    <mat-form-field class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-12">
        <mat-label>Fecha de nacimiento</mat-label>
        <input matInput formControlName="fechaNacimiento" type="date" />
        <mat-error>
            <app-error-message [control]="dpControls['fechaNacimiento']" />
        </mat-error>
    </mat-form-field>



</form>
