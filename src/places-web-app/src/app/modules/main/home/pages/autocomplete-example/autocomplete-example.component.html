<p>autocomplete-example works!</p>



<form class="example-form">
  <mat-form-field class="example-full-width">
    <mat-label>País</mat-label>
    <input type="text"
           placeholder="Pick one"
           aria-label="País"
           matInput
           [formControl]="myControl"
           [matAutocomplete]="auto">
    <mat-autocomplete #auto="matAutocomplete">
      @for (p of filtrados(); track p.paisId) {
        <mat-option [value]="p">{{p.nombre}}</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>
</form>

<mat-select>
    @for (p of paises(); track p.paisId) {
        <mat-option [value]="p.paisId">{{p.nombre}}</mat-option>
    }
</mat-select>
