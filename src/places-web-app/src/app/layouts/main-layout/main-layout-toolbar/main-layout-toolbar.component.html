<mat-toolbar class="p-0">
    <button matIconButton (click)="onClickMenu()">
        <mat-icon>menu</mat-icon>
    </button>
    <span>Places App</span>

    <span class="toolbar-spacer"></span>
    <small>{{menuTreeLabels()}}</small>
    <!-- Aquí puedes agregar otros elementos de la barra de herramientas, como botones de acción, iconos, etc. -->
    <button matIconButton>
        <mat-icon>favorite</mat-icon>
    </button>
    <button matIconButton (click)="closeSession()" matTooltip="Cerrar sesión">
        <mat-icon>close</mat-icon>
    </button>
</mat-toolbar>
